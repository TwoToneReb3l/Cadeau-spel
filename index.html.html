<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verjaardag Cadeau Keuzespel</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7efe5, #e7f0ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #222;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.12);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
      background: #222;
      color: white;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .choice {
      background: #fafafa;
      border: 2px solid #eee;
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 165px;
    }

    .choice:hover {
      transform: translateY(-4px);
      border-color: #222;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .emoji {
      font-size: 46px;
      margin-bottom: 10px;
    }

    .choice h2 {
      margin: 8px 0;
      font-size: 20px;
    }

    .choice p {
      font-size: 14px;
      margin: 0;
      color: #555;
    }

    .result-box {
      background: #f7f7f7;
      border-radius: 20px;
      padding: 24px;
      margin-top: 24px;
    }

    .result-emoji {
      font-size: 70px;
    }

    .small {
      font-size: 14px;
      color: #666;
    }

    .progress {
      height: 10px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
      margin: 22px 0;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #222;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <section id="intro">
      <h1>🎁 Jouw verjaardagscadeau-keuzespel</h1>
      <p>
        Je krijgt vandaag geen standaard cadeau, maar een keuze-avontuur.
        Beantwoord een paar korte vragen en ontdek welk uitje het beste bij jou past.
      </p>
      <button onclick="startGame()">Start het spel</button>
    </section>

    <section id="questionScreen" class="hidden">
      <h1 id="questionTitle"></h1>
      <p id="questionText"></p>

      <div class="progress">
        <div id="progressBar" class="bar"></div>
      </div>

      <div id="answerButtons"></div>
    </section>

    <section id="resultScreen" class="hidden">
      <h1>De keuze is gemaakt...</h1>
      <div class="result-box">
        <div id="resultEmoji" class="result-emoji"></div>
        <h1 id="resultTitle"></h1>
        <p id="resultDescription"></p>
      </div>
      <p class="small">Niet tevreden? Dan mag je natuurlijk opnieuw spelen 😉</p>
      <button onclick="resetGame()">Opnieuw spelen</button>
    </section>
  </div>

  <script>
    const gifts = {
      varen: {
        title: "Een dagje varen in Zwolle",
        emoji: "🚤",
        description: "Samen het water op, lekker relaxed varen door Zwolle, met drinken en snacks erbij. Romantisch, rustig en gezellig."
      },
      bonbons: {
        title: "Een workshop bonbons maken",
        emoji: "🍫",
        description: "Samen iets lekkers maken, proeven en waarschijnlijk met een doosje zelfgemaakte bonbons naar huis. Creatief en gezellig."
      },
      golf: {
        title: "4 beginnerslessen golf",
        emoji: "⛳",
        description: "Een sportieve mini-uitdaging: vier keer samen leren golfen. Leuk als je iets nieuws wilt proberen en er vaker op uit wilt."
      }
    };

    const questions = [
      {
        title: "Vraag 1",
        text: "Waar heb je op dit moment het meeste zin in?",
        answers: [
          { text: "Lekker buiten ontspannen", points: { varen: 2, golf: 1 } },
          { text: "Iets lekkers maken", points: { bonbons: 2 } },
          { text: "Iets nieuws leren", points: { golf: 2, bonbons: 1 } }
        ]
      },
      {
        title: "Vraag 2",
        text: "Wat past het beste bij jouw ideale dagje uit?",
        answers: [
          { text: "Rustig, gezellig en samen kletsen", points: { varen: 2 } },
          { text: "Creatief bezig zijn", points: { bonbons: 2 } },
          { text: "Een beetje actief en competitief", points: { golf: 2 } }
        ]
      },
      {
        title: "Vraag 3",
        text: "Welke sfeer spreekt je het meeste aan?",
        answers: [
          { text: "Zomer, water en hapjes mee", points: { varen: 3 } },
          { text: "Chocolade, gezelligheid en proeven", points: { bonbons: 3 } },
          { text: "Buiten sporten en beter worden", points: { golf: 3 } }
        ]
      },
      {
        title: "Laatste vraag",
        text: "Wat zou je later het leukst vinden om over te vertellen?",
        answers: [
          { text: "Dat we samen Zwolle vanaf het water hebben gezien", points: { varen: 2 } },
          { text: "Dat we zelf bonbons hebben gemaakt", points: { bonbons: 2 } },
          { text: "Dat we samen aan golf zijn begonnen", points: { golf: 2 } }
        ]
      }
    ];

    let currentQuestion = 0;
    let score = { varen: 0, bonbons: 0, golf: 0 };

    function startGame() {
      document.getElementById("intro").classList.add("hidden");
      document.getElementById("questionScreen").classList.remove("hidden");
      showQuestion();
    }

    function showQuestion() {
      const question = questions[currentQuestion];
      document.getElementById("questionTitle").innerText = question.title;
      document.getElementById("questionText").innerText = question.text;

      const progress = ((currentQuestion) / questions.length) * 100;
      document.getElementById("progressBar").style.width = progress + "%";

      const answerButtons = document.getElementById("answerButtons");
      answerButtons.innerHTML = "";

      question.answers.forEach(answer => {
        const button = document.createElement("button");
        button.innerText = answer.text;
        button.onclick = () => selectAnswer(answer.points);
        answerButtons.appendChild(button);
      });
    }

    function selectAnswer(points) {
      Object.keys(points).forEach(key => {
        score[key] += points[key];
      });

      currentQuestion++;

      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById("progressBar").style.width = "100%";

      const winner = Object.keys(score).reduce((a, b) => score[a] > score[b] ? a : b);
      const result = gifts[winner];

      document.getElementById("questionScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      document.getElementById("resultEmoji").innerText = result.emoji;
      document.getElementById("resultTitle").innerText = result.title;
      document.getElementById("resultDescription").innerText = result.description;
    }

    function resetGame() {
      currentQuestion = 0;
      score = { varen: 0, bonbons: 0, golf: 0 };
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("intro").classList.remove("hidden");
      document.getElementById("progressBar").style.width = "0%";
    }
  </script>
</body>
</html>
